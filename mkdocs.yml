markdown_extensions:
  - meta
  - admonition
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  - pymdownx.highlight:
      anchor_linenums: true
      # Live-CLJS cells in cljs/index.md use the ```cljs fence. The playground
      # bootstrap keys off the `.language-cljs` class that pymdownx.highlight
      # emits when pygments_lang_class is on; the static (no-JS) fallback gets
      # clojure-style syntax highlighting via the custom fence below in
      # pymdownx.superfences.
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        # Roll-your-own playground cells (rf2-y99zt, Phase 1; cutover rf2-j06sy,
        # Phase 1b). ```cljs fences emit <pre class="language-cljs">;
        # tools/playground's bootstrap (cljs/playground.js) turns each into a
        # CM6 editor evaluated by Scittle. The static (no-JS) fallback gets
        # clojure-style syntax highlighting via the class pymdownx emits. This
        # replaced the Klipse ```klipse fence as of Phase 1b.
        - name: cljs
          class: language-cljs
          format: !!python/name:pymdownx.superfences.fence_code_format
        # Live reagent/re-frame component cells (rf2-bujlr, Phase 2). ```cljs-render
        # fences emit <pre class="language-cljs-render">; tools/playground's
        # bootstrap turns each into a CM6 editor whose last form is MOUNTED as a
        # reagent component (stock reagent + re-frame, loaded on demand via the
        # Scittle plugins) instead of pr-str'd. Plain ```cljs cells are unchanged.
        - name: cljs-render
          class: language-cljs-render
          format: !!python/name:pymdownx.superfences.fence_code_format
        # Live re-frame2 component cells (rf2-00zvt, Phase 3). ```cljs-rf2 fences
        # emit <pre class="language-cljs-rf2">; tools/playground's bootstrap turns
        # each into a CM6 editor whose last form is MOUNTED as a reagent2
        # component, evaluated against re-frame2's OWN public API (re-frame.core
        # v2 — reg-event-db / reg-sub / dispatch / subscribe), NOT stock
        # re-frame. The re-frame2 SCI bundle (cljs/playground-rf2.js, built by
        # tools/playground/sci) is loaded on demand only on pages that have a
        # ```cljs-rf2 cell. Plain ```cljs and stock ```cljs-render cells are
        # unchanged.
        - name: cljs-rf2
          class: language-cljs-rf2
          format: !!python/name:pymdownx.superfences.fence_code_format
        # Mermaid diagrams (rf2-9ewbc). Material renders ```mermaid fences
        # natively (it ships Mermaid and wires the renderer when this fence
        # is declared) — no extra plugin needed. Enables architecture,
        # six-domino, state-machine, and routing-flow diagrams in the guide
        # and spec as fenced blocks.
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
