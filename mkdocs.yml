markdown_extensions:
  - meta
  - admonition
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  - pymdownx.highlight:
      anchor_linenums: true
      # Klipse cells in cljs/index.md use the
      # ```klipse fence. The Klipse JS plugin keys off the `.language-klipse`
      # class that pymdownx.highlight emits when pygments_lang_class is on;
      # the static (no-JS) fallback gets clojure-style syntax highlighting
      # via the alias below in pymdownx.superfences.
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: klipse
          class: language-klipse
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
