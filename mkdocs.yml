site_name: "re-frame2"
site_description: "AI-first, re-frame-first pattern for SPAs — specification, guide, and API reference."
site_author: Mike Thompson
site_url: https://day8.github.io/re-frame2/

repo_name: day8/re-frame2
repo_url: https://github.com/day8/re-frame2

copyright: Copyright &copy; 2014-2026 Michael Thompson

# All published markdown lives under docs/ at build time. The narrative
# guide already lives under docs/guide/. The normative spec lives at the
# repo root in spec/ — `bb stage-docs` (or the docs.yml CI step) copies
# spec/ into docs/spec/ before `mkdocs build` runs. The staged copies are
# ignored by git (see .gitignore).
docs_dir: docs
site_dir: site

# Build-time hooks. mkdocs_hooks.py rewrites guide/* cross-references
# from ../../spec/ (correct for GitHub source-tree browsing, where spec/
# lives at the repo root) to ../spec/ (correct for the staged docs tree
# this build sees, where spec/ has been copied to docs/spec/). See the
# comment block at the top of mkdocs_hooks.py.
hooks:
  - mkdocs_hooks.py

theme:
  name: material
  icon:
    logo: material/home
    repo: fontawesome/brands/git-alt
  language: en
  palette:
    primary: blue
    accent: blue
  font:
    text: IBM Plex Sans
    code: Source Code Pro
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.annotate
    - content.code.copy

# Material bundles the `search` plugin and enables it by default when no
# `plugins:` block is declared. We declare it explicitly (rf2-5790) so the
# search affordance — load-bearing for navigating a 7000+ line guide — stays
# wired up across future MkDocs/Material versions that may flip the default.
# Any future plugin addition (e.g. minify, redirects) must keep `- search`
# in the list, otherwise search silently disappears.
plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/day8

nav:
  - Home: index.md

  - Guide:
    - Overview: guide/README.md
    - "00 — ClojureScript for non-Clojurians": guide/00-clojurescript-for-non-clojurians.md
    - "02 — app-db": guide/02-app-db.md
    - "03 — Your first app": guide/03-your-first-app.md
    - "04 — Events, state, the cycle": guide/04-events-state-cycle.md
    - "04a — Schemas": guide/04a-schemas.md
    - "05 — Coeffects": guide/05-coeffects.md
    - "06 — Views and frames": guide/06-views-and-frames.md
    - "06a — Frames": guide/06a-frames.md
    - "07 — Interceptors": guide/07-interceptors.md
    - "08 — State machines": guide/08-state-machines.md
    - "09 — Forms": guide/09-forms.md
    - "10 — Doing HTTP requests": guide/10-doing-http-requests.md
    - "11 — The server side": guide/11-server-side.md
    - "12 — The dynamic model": guide/12-the-dynamic-model.md
    - "13 — Testing": guide/13-testing.md
    - "14 — Errors": guide/14-errors.md
    - "15 — Tooling": guide/15-devtools-and-pair-tools.md
    - "16 — Performance": guide/16-performance.md
    - "17 — Routing": guide/17-routing.md
    - "17a — Routing: reference and advanced topics": guide/17a-routing-reference.md
    - "18 — From re-frame v1": guide/18-from-re-frame-v1.md
    - "19 — Adapters": guide/19-adapters.md
    - "20 — Where to go next": guide/20-where-next.md
    - "21 — Stories": guide/21-stories.md
    - "Useful patterns":
      - "22 — Production observability": guide/22-trace-to-datadog.md
      - "23a — Privacy: keeping secrets out of traces": guide/23a-privacy-secrets.md
      - "23b — Large blobs: keeping the wire small": guide/23b-large-blobs.md

  - Skills:
    - Overview: skills/index.md
    - "re-frame2 (authoring)": skills/re-frame2.md
    - re-frame2-setup: skills/re-frame2-setup.md
    - "re-frame-migration (v1→v2)": skills/re-frame-migration.md
    - re-frame2-implementor: skills/re-frame2-implementor.md
    - re-frame-pair2: skills/re-frame-pair2.md
    - re-frame-pair-retro2: skills/re-frame-pair-retro2.md

  - API:
    - Reference: spec/API.md

markdown_extensions:
  - meta
  - admonition
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  - pymdownx.highlight:
      anchor_linenums: true
      # Klipse cells in guide/00-clojurescript-for-non-clojurians.md use the
      # ```klipse fence. The Klipse JS plugin keys off the `.language-klipse`
      # class that pymdownx.highlight emits when pygments_lang_class is on;
      # the static (no-JS) fallback gets clojure-style syntax highlighting
      # via the alias below in pymdownx.superfences.
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: klipse
          class: language-klipse
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
