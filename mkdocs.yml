site_name: "re-frame2"
site_description: "AI-first, re-frame-first pattern for SPAs — specification, guide, and API reference."
site_author: Mike Thompson
site_url: https://day8.github.io/re-frame2/

repo_name: day8/re-frame2
repo_url: https://github.com/day8/re-frame2

copyright: Copyright &copy; 2014-2026 Michael Thompson

# All published markdown lives under docs/ at build time. The narrative
# guide already lives under docs/guide/. The normative spec lives at the
# repo root in spec/ — the docs.yml CI step copies spec/ into docs/spec/
# (and migration/ into docs/migration/) before `mkdocs build` runs. The
# staged copies are ignored by git (see .gitignore).
docs_dir: docs
site_dir: site

# Build-time hooks. mkdocs_hooks.py rewrites guide/* cross-references
# from ../../spec/ (correct for GitHub source-tree browsing, where spec/
# lives at the repo root) to ../spec/ (correct for the staged docs tree
# this build sees, where spec/ has been copied to docs/spec/). See the
# comment block at the top of mkdocs_hooks.py.
hooks:
  - mkdocs_hooks.py

theme:
  name: material
  icon:
    logo: material/home
    repo: fontawesome/brands/git-alt
  language: en
  # Light/dark palette toggle (rf2-q0n02). Two schemes share the existing
  # blue brand colour; `media` seeds the initial scheme from the reader's OS
  # preference, and each `toggle` adds a manual switch in the header. The
  # blue primary/accent reads cleanly against both `default` (light) and
  # `slate` (dark) — Material darkens the primary surface automatically.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: IBM Plex Sans
    code: Source Code Pro
  features:
    - navigation.tabs
    - navigation.sections
    # navigation.indexes lets a section's own index/landing page BE the
    # clickable section label (see the folded sections in `nav:` below)
    # instead of a redundant "Overview"/"Welcome" first child (rf2-zr5r5,
    # rf2-qgpkm).
    - navigation.indexes
    # SPA-style instant page loads + link prefetch — makes a corpus this
    # large (26-chapter guide + multi-thousand-line spec) feel instant
    # (rf2-zr5r5). The live-code page (docs/cljs/index.md) keeps working
    # under instant nav: the playground bootstrap is an `extra_javascript`
    # entry (see below) that Material re-runs on every instant navigation,
    # rather than an inline <script> (which instant nav does NOT re-run).
    - navigation.instant
    - navigation.instant.prefetch
    # Back-to-top affordance on long pages (spec chapters run thousands of
    # lines).
    - navigation.top
    # Keep the TOC sidebar scrolled to the active heading on long pages.
    - toc.follow
    # Richer search — search is load-bearing for this corpus (see the
    # `plugins:` comment). suggest = inline autocomplete, highlight = mark
    # matches on the landed page, share = deep-link a search query.
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy

# Material bundles the `search` plugin and enables it by default when no
# `plugins:` block is declared. We declare it explicitly (rf2-5790) so the
# search affordance — load-bearing for navigating a 7000+ line guide — stays
# wired up across future MkDocs/Material versions that may flip the default.
# Any future plugin addition (e.g. minify, redirects) must keep `- search`
# in the list, otherwise search silently disappears.
plugins:
  - search
  # OpenGraph / Twitter social preview cards (rf2-orxjj). Material's `social`
  # plugin auto-generates one branded card image per page from the site
  # metadata + the brand palette below, then injects the `og:image` /
  # `twitter:image` meta tags — so shared docs URLs render a professional
  # preview on Slack/Twitter/etc. `site_url` (set at the top of this file) is
  # required for the absolute image URLs the cards emit.
  #
  # Card generation needs the `imaging` extra's system libraries (Cairo +
  # Pango via material[imaging]). CI installs them (see .github/workflows/
  # docs.yml) and sets CI=true, so `enabled: !ENV [CI, false]` turns the
  # plugin on there. A LOCAL `mkdocs build --strict` (where Cairo/Pango may
  # be absent) sees CI unset → `enabled` is false → the plugin returns from
  # on_config BEFORE its hard cairosvg dependency check (plugin.py: `cards =
  # enabled`, then `if not cards: return` precedes the import probe), so the
  # strict build still passes. Gating on `enabled` (not `cards`) is required:
  # the plugin overwrites `cards` with `enabled` at on_config time, so a
  # `cards:`-only gate is ignored and the dependency check still fires.
  - social:
      enabled: !ENV [CI, false]
      cards_layout_options:
        background_color: "#1976d2"  # Material `blue` primary
        color: "#ffffff"

# Live-code bootstrap. A small, site-wide loader that does NOTHING unless the
# page actually has live cells, and rides Material's instant-nav (re-run on
# every page swap; subscribe once to document$).
#
#   - Playground (rf2-y99zt, Phase 1; cutover rf2-j06sy, Phase 1b): the
#     roll-your-own live-CLJS-cell renderer — CM6 + @nextjournal/clojure-mode +
#     Scittle (SCI). Keys off the ```cljs fence (.language-cljs); injects the
#     ~183 KB-gz Scittle <script> only on pages with ```cljs cells. Built by
#     tools/playground (esbuild). Replaced Klipse (the vendored ~7 MB plugin)
#     as of Phase 1b.
extra_javascript:
  - cljs/playground.js

extra_css:
  - cljs/playground.css

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/day8

