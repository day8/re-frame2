site_name: "re-frame2"
site_description: "AI-first, re-frame-first pattern for SPAs — specification, guide, and API reference."
site_author: Mike Thompson
site_url: https://day8.github.io/re-frame2/

repo_name: day8/re-frame2
repo_url: https://github.com/day8/re-frame2

copyright: Copyright &copy; 2014-2026 Michael Thompson

# All published markdown lives under docs/ at build time. The narrative
# guide already lives under docs/guide/. The normative spec lives at the
# repo root in spec/ — the docs.yml CI step copies spec/ into docs/spec/
# (and migration/ into docs/migration/) before `mkdocs build` runs. The
# staged copies are ignored by git (see .gitignore).
docs_dir: docs
site_dir: site

# Build-time hooks. mkdocs_hooks.py rewrites guide/* cross-references
# from ../../spec/ (correct for GitHub source-tree browsing, where spec/
# lives at the repo root) to ../spec/ (correct for the staged docs tree
# this build sees, where spec/ has been copied to docs/spec/). See the
# comment block at the top of mkdocs_hooks.py.
hooks:
  - mkdocs_hooks.py

theme:
  name: material
  icon:
    logo: material/home
    repo: fontawesome/brands/git-alt
  language: en
  # Light/dark palette toggle (rf2-q0n02). Two schemes share the existing
  # blue brand colour; `media` seeds the initial scheme from the reader's OS
  # preference, and each `toggle` adds a manual switch in the header. The
  # blue primary/accent reads cleanly against both `default` (light) and
  # `slate` (dark) — Material darkens the primary surface automatically.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: IBM Plex Sans
    code: Source Code Pro
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.annotate
    - content.code.copy

# Material bundles the `search` plugin and enables it by default when no
# `plugins:` block is declared. We declare it explicitly (rf2-5790) so the
# search affordance — load-bearing for navigating a 7000+ line guide — stays
# wired up across future MkDocs/Material versions that may flip the default.
# Any future plugin addition (e.g. minify, redirects) must keep `- search`
# in the list, otherwise search silently disappears.
plugins:
  - search

extra:
