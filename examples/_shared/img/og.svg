<?xml version="1.0" encoding="UTF-8"?>
<!-- Open Graph card — shared across all three substrates (rf2-v4fpe Option 2).
     1200x630 — standard Twitter / Facebook / LinkedIn aspect ratio.
     Matches the shared 'Editorial Warm' identity in examples/_shared/css/style.css:
     warm paper bg, deep ink, amber accent, Inter typography. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="grain" cx="20%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#C8741A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C8741A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="grain2" cx="78%" cy="70%" r="60%">
      <stop offset="0%"   stop-color="#E5A23D" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#E5A23D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#F7F3EC"/>
  <rect width="1200" height="630" fill="url(#grain)"/>
  <rect width="1200" height="630" fill="url(#grain2)"/>
  <text x="80" y="180" font-family="'Inter', system-ui, sans-serif" font-size="64" font-weight="800" fill="#1A1814">re-frame2</text>
  <text x="80" y="320" font-family="'Inter', system-ui, sans-serif" font-size="108" font-weight="800" fill="#1A1814" letter-spacing="-0.025em">Examples</text>
  <text x="80" y="380" font-family="'Inter', system-ui, sans-serif" font-size="36" fill="#5C5448">Worked examples for the modern Clojure framework</text>
  <line x1="80" y1="450" x2="200" y2="450" stroke="#C8741A" stroke-width="4"/>
  <text x="80" y="510" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" fill="#8A8270" letter-spacing="0.16em">REAGENT - UIX - HELIX</text>
  <!-- monogram in the corner -->
  <g transform="translate(1020,80)">
    <rect width="100" height="100" rx="14" fill="#1A1814"/>
    <text x="50" y="68" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="56" font-weight="800" fill="#F7F3EC">r2</text>
    <rect x="20" y="82" width="60" height="4" rx="2" fill="#C8741A"/>
  </g>
</svg>
