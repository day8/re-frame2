# Builds and publishes the re-frame2 docs site (rf2-h09k).
#
# Source: docs/guide/ (narrative) + spec/ (normative) + spec/API.md (reference).
# Sink:   https://day8.github.io/re-frame2/
#
# PREREQUISITE: the repository's Pages source must be set to "GitHub Actions"
# (Settings → Pages → Build and deployment → Source). If it is still set to
# "Deploy from a branch" the deploy-pages step below will fail.
#
# This workflow only triggers on docs-affecting pushes to `main`, matching
# pull-request path filters, or via manual dispatch. The first publish is a
# deliberate manual step (run via the Actions tab once Pages is configured) —
# see PR description for rf2-h09k.

name: docs

on:
  push:
    branches: [main]
    # Trigger only on paths that actually feed the staged docs site or the
    # link-validator's own fixtures. `skills/**/*.md` and `tools/**/*.md`
    # are deliberately NOT listed — neither tree is copied into docs_dir
    # (see mkdocs_hooks.py: tools/ and skills/ internals are rewritten to
    # GitHub blob URLs precisely because they don't exist in the staged
    # site). The per-skill summary pages that DO render live at
    # docs/skills/X.md and are already covered by `docs/**` (rf2-8k7vm).
    paths:
      - 'docs/**'
      - 'spec/**'
      - 'mkdocs.yml'
      - 'mkdocs_hooks.py'
      - 'TESTING.md'
      - 'requirements.txt'
      - 'scripts/check_doc_slugs.py'
      - 'scripts/_test_fixtures/check_doc_slugs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'spec/**'
      - 'mkdocs.yml'
      - 'mkdocs_hooks.py'
      - 'TESTING.md'
      - 'requirements.txt'
      - 'scripts/check_doc_slugs.py'
      - 'scripts/_test_fixtures/check_doc_slugs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow only one concurrent Pages deployment, but do not cancel an
# in-progress run so it can finish before the next starts.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: MkDocs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f  # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install MkDocs + plugins
        run: pip install -r requirements.txt

      # Validate that every in-repo markdown link resolves — both the
      # target .md file (rf2-unge8) and the heading-slug anchor (rf2-sefq).
      # Catches the kind of cross-link drift that the cluster-#10 audit
      # surfaced (105+ broken anchors after chapter renumbers and heading
      # renames) plus the renamed-file case the 2026-05-12 audit caught
      # (e.g. `[text](19-where-next.md)` after #483 renamed the file).
      # See scripts/check_doc_slugs.py.  Runs before `mkdocs build` so
      # the failure mode is "this PR broke a doc link", not "mkdocs
      # emitted a warning".
      #
      # Strict mode: rf2-ftkz swept the 26 pre-existing broken anchors
      # main carried at landing, so this step is fail-loud — a PR that
      # introduces a broken link fails the build.
      - name: Self-test the link validator
        run: python scripts/check_doc_slugs.py --self-test --verbose

      - name: Validate doc links (targets + anchors)
        run: python scripts/check_doc_slugs.py --verbose

      # Stage the spec/ tree under docs/spec/ so MkDocs (which requires
      # docs_dir to be a child of the config file) can see it. The local
      # equivalent is `cp -r spec docs/spec` before `mkdocs build`. The
      # staged copy is .gitignored — never commit it.
      - name: Stage spec/ into docs/spec/
        run: |
          rm -rf docs/spec
          cp -r spec docs/spec

      - name: Build site
        run: mkdocs build

      - name: Upload Pages artifact
        # v5 (transitively pins actions/upload-artifact to a SHA, which v3 did not — see rf2-xmmh).
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site/

  deploy:
    # Only deploy from main pushes — PRs run build only (catch regressions) but don't deploy.
    if: github.event_name == 'push'
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
