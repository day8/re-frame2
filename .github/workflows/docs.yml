# Builds and publishes the re-frame2 docs site (rf2-h09k).
#
# Source: docs/guide/ (narrative) + spec/ (normative) + spec/API.md (reference).
# Sink:   https://day8.github.io/re-frame2/
#
# PREREQUISITE: the repository's Pages source must be set to "GitHub Actions"
# (Settings → Pages → Build and deployment → Source). If it is still set to
# "Deploy from a branch" the deploy-pages step below will fail.
#
# This workflow only triggers on push to `main` or via manual dispatch. The
# first publish is a deliberate manual step (run via the Actions tab once
# Pages is configured) — see PR description for rf2-h09k.

name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'spec/**'
      - 'skills/**/*.md'
      - 'tools/**/*.md'
      - 'mkdocs.yml'
      - 'mkdocs_hooks.py'
      - 'requirements.txt'
      - 'scripts/check_doc_slugs.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow only one concurrent Pages deployment, but do not cancel an
# in-progress run so it can finish before the next starts.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: MkDocs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f  # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install MkDocs + plugins
        run: pip install -r requirements.txt

      # Validate that every in-repo markdown anchor link (e.g.
      # [text](file.md#anchor)) resolves to a real heading slug in the
      # target file.  Catches the kind of cross-link drift that the
      # cluster-#10 audit surfaced (105+ broken anchors after chapter
      # renumbers and heading renames).  See scripts/check_doc_slugs.py
      # and rf2-sefq.  Runs before `mkdocs build` so the failure mode
      # is "this PR broke a doc anchor", not "mkdocs emitted a warning".
      #
      # NOTE: `continue-on-error: true` is intentional for the initial
      # landing — main currently carries 26 pre-existing broken anchors
      # (rf2-ftkz tracks the sweep).  Once rf2-ftkz closes, drop this
      # flag so a broken anchor fails the build strictly.
      - name: Validate doc anchor links
        run: python scripts/check_doc_slugs.py --verbose
        continue-on-error: true

      # Stage the spec/ tree under docs/spec/ so MkDocs (which requires
      # docs_dir to be a child of the config file) can see it. The local
      # equivalent is `cp -r spec docs/spec` before `mkdocs build`. The
      # staged copy is .gitignored — never commit it.
      - name: Stage spec/ into docs/spec/
        run: |
          rm -rf docs/spec
          cp -r spec docs/spec

      - name: Build site
        run: mkdocs build

      - name: Upload Pages artifact
        # v5 (transitively pins actions/upload-artifact to a SHA, which v3 did not — see rf2-xmmh).
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site/

  deploy:
    # Only deploy from main pushes — PRs run build only (catch regressions) but don't deploy.
    if: github.event_name == 'push'
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
