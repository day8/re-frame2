  # ─────────────────────────────────────────────────────────────────
  # 5. GitHub Release. Cuts only after every leaf has shipped — a
  #    partial deploy means no Release is created and the next step is
  #    the recovery procedure documented at the top of this file.
  # ─────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs:
      - deploy-core
      - deploy-reagent
      - deploy-uix
      - deploy-helix
      - deploy-schemas
      - deploy-machines
      - deploy-routing
      - deploy-flows
      - deploy-http
      - deploy-ssr
      - deploy-epoch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Create GitHub Release
        # Mirrors re-frame v1's release-notes pattern — minimal body
        # with a link back to the CHANGELOG. Mike updates CHANGELOG.md
        # in the same release commit before tagging.
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844  # v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            See [CHANGELOG.md](https://github.com/day8/re-frame2/blob/main/CHANGELOG.md) for release notes.

            Artefacts published to Clojars:
            - `day8/re-frame2` ${{ needs.deploy-core.outputs.version }}
            - `day8/re-frame2-reagent` ${{ needs.deploy-core.outputs.version }}
            - `day8/re-frame2-uix` ${{ needs.deploy-core.outputs.version }}
            - `day8/re-frame2-helix` ${{ needs.deploy-core.outputs.version }}
            - `day8/re-frame2-schemas` ${{ needs.deploy-core.outputs.version }}
            - `day8/re-frame2-machines` ${{ needs.deploy-core.outputs.version }}
            - `day8/re-frame2-routing` ${{ needs.deploy-core.outputs.version }}
            - `day8/re-frame2-flows` ${{ needs.deploy-core.outputs.version }}
            - `day8/re-frame2-http` ${{ needs.deploy-core.outputs.version }}
            - `day8/re-frame2-ssr` ${{ needs.deploy-core.outputs.version }}
            - `day8/re-frame2-epoch` ${{ needs.deploy-core.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
