name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  jvm-core:
    name: JVM core (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/core
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-core-${{ hashFiles('implementation/core/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-core-
            ${{ runner.os }}-clj-

      - name: Run JVM tests (core artefact)
        run: clojure -M:test

  jvm-reagent:
    name: JVM reagent-adapter (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/reagent
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-reagent-${{ hashFiles('implementation/reagent/deps.edn', 'implementation/core/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-reagent-
            ${{ runner.os }}-clj-

      # The Reagent artefact's :test alias has no JVM-runnable tests of
      # its own (the adapter ns is :cljs-only). The job exists so the
      # artefact's deps + classpath wiring stay green and any future JVM
      # adapter probe lands here. Skip-on-empty is acceptable; the
      # cognitect test-runner returns 0 when there are no test
      # namespaces matching its pattern.
      - name: Run JVM tests (reagent artefact, classpath probe)
        run: clojure -M:test || echo "no JVM-runnable tests in reagent artefact (expected)"

  jvm-schemas:
    name: JVM schemas (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/schemas
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-schemas-${{ hashFiles('implementation/schemas/deps.edn', 'implementation/core/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-schemas-
            ${{ runner.os }}-clj-

      - name: Run JVM tests (schemas artefact)
        run: clojure -M:test

  jvm-machines:
    name: JVM machines (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/machines
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-machines-${{ hashFiles('implementation/machines/deps.edn', 'implementation/core/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-machines-
            ${{ runner.os }}-clj-

      # The machines artefact's :test alias has no JVM-runnable tests of
      # its own (the machine_cljs_test is CLJS-only). The job exists so
      # the artefact's deps + classpath wiring stay green and any future
      # JVM-runnable machine tests land here. Skip-on-empty is acceptable;
      # the cognitect test-runner returns 0 when there are no test
      # namespaces matching its pattern.
      - name: Run JVM tests (machines artefact, classpath probe)
        run: clojure -M:test || echo "no JVM-runnable tests in machines artefact (expected)"

  jvm-routing:
    name: JVM routing (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/routing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-routing-${{ hashFiles('implementation/routing/deps.edn', 'implementation/core/deps.edn', 'implementation/schemas/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-routing-
            ${{ runner.os }}-clj-

      - name: Run JVM tests (routing artefact)
        run: clojure -M:test

  cljs:
    name: CLJS (shadow-cljs :node-test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Cache Maven / gitlibs (shadow-cljs deps)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      - name: Compile and run node-test build (core + reagent)
        run: |
          npx shadow-cljs compile node-test
          node out/node-test.js

  cljs-browser:
    name: CLJS (shadow-cljs :browser-test, headless Chromium)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs (shadow-cljs deps)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-browser-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cljs-browser-
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      - name: Install Playwright (Chromium + system deps)
        run: npx playwright install --with-deps chromium

      - name: Compile :browser-test, serve, and run Playwright runner
        run: npm run test:browser

  cljs-elision:
    name: CLJS production elision (Spec 009, bead rf2-11hn)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs (shadow-cljs deps)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-elision-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cljs-elision-
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      # Build the elision probe (goog.DEBUG=false) and the control build
      # (goog.DEBUG=true), then grep both for sentinel strings that only
      # appear in dev-gated branches.  The contract:
      #   - production bundle:  sentinels MUST be ABSENT
      #   - control    bundle:  sentinels MUST be PRESENT
      # If either fails, the elision contract (Spec 009 §Production
      # builds) is broken or the test methodology has lost its signal.
      - name: Verify production elision (advanced compile + grep)
        run: npm run test:elision

  examples-browser:
    name: Examples (browser, headless Chromium, rf2-lyj0)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs (shadow-cljs deps)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-examples-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cljs-examples-
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      - name: Install Playwright (Chromium + system deps)
        run: npx playwright install --with-deps chromium

      # Compile every example shadow-cljs build, stage the per-example
      # index.html alongside the bundle, serve out/examples on :8030,
      # and run the Playwright specs that sit alongside each example
      # (examples/<name>/<name>.spec.cjs). Each spec asserts a
      # user-visible behaviour for its example.
      #
      # NOT a required check on main initially — mirrors the rollout
      # pattern used for cljs-browser (rf2-zoem). Promote to required
      # once the suite has been stable for a couple of cycles.
      - name: Compile examples, serve, and run Playwright specs
        run: npm run test:examples
