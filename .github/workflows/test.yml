      - name: Cache Maven / gitlibs (shadow-cljs deps)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-browser-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cljs-browser-
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      - name: Install Playwright (Chromium + system deps)
        run: npx playwright install --with-deps chromium

      - name: Compile :browser-test, serve, and run Playwright runner
        run: npm run test:browser

  cljs-elision:
    name: CLJS production elision (Spec 009, bead rf2-11hn)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs (shadow-cljs deps)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-elision-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cljs-elision-
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      # Build the elision probe (goog.DEBUG=false) and the control build
      # (goog.DEBUG=true), then grep both for sentinel strings that only
      # appear in dev-gated branches.  The contract:
      #   - production bundle:  sentinels MUST be ABSENT
      #   - control    bundle:  sentinels MUST be PRESENT
      # If either fails, the elision contract (Spec 009 §Production
      # builds) is broken or the test methodology has lost its signal.
      - name: Verify production elision (advanced compile + grep)
        run: npm run test:elision

  cljs-bundle-isolation:
    name: CLJS bundle isolation (counter, rf2-51x5)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs (shadow-cljs deps)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-bundle-isolation-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cljs-bundle-isolation-
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      # Build the counter example (the canonical no-feature app — it
      # imports zero per-feature artefacts) and grep the produced
      # main.js for each per-feature artefact's internal-only sentinel
      # strings. The contract: every per-feature ns (schemas / machines
      # / routing / flows / http / ssr) must be ABSENT from the counter
      # bundle. A small consumer-side allow-list (the late-bind hook
      # keys / fx-case keys core publishes for each artefact) is
      # tracked with explicit expected-hit counts.
      #
      # If a future change accidentally re-imports a split-out namespace
      # into core (or any of core's transitive deps), one of the
      # internal sentinels will appear in the bundle and this step will
      # fail. The dual of cljs-elision (Spec 009) for the per-feature
      # split contract (rf2-p7va, rf2-xbtj, rf2-k682, rf2-tfw3,
      # rf2-5kpd, rf2-uo7v).
      - name: Verify counter bundle isolates every per-feature artefact
        run: npm run test:bundle-isolation

  examples-browser:
    name: Examples (browser, headless Chromium, rf2-lyj0)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs (shadow-cljs deps)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-examples-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cljs-examples-
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      - name: Install Playwright (Chromium + system deps)
        run: npx playwright install --with-deps chromium

      # Compile every example shadow-cljs build, stage the per-example
      # index.html alongside the bundle, serve out/examples on :8030,
      # and run the Playwright specs that sit alongside each example
      # (examples/<name>/<name>.spec.cjs). Each spec asserts a
      # user-visible behaviour for its example.
      #
      # NOT a required check on main initially — mirrors the rollout
      # pattern used for cljs-browser (rf2-zoem). Promote to required
      # once the suite has been stable for a couple of cycles.
      - name: Compile examples, serve, and run Playwright specs
        run: npm run test:examples
