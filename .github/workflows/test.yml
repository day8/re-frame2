name: tests

on:
  push:
    branches: [main]
    # Push-only filter: docs/site-only pushes are covered by docs.yml and
    # bead-only pushes should run no CI. Pull requests deliberately stay
    # unfiltered so required checks cannot remain permanently pending.
    paths-ignore:
      - '.beads/**'
      - 'docs/**'
      - 'spec/**'
      - 'skills/**/*.md'
      - 'tools/**/*.md'
      - 'mkdocs.yml'
      - 'mkdocs_hooks.py'
      - 'TESTING.md'
      - 'requirements.txt'
      - 'scripts/check_doc_slugs.py'
      - 'scripts/_test_fixtures/check_doc_slugs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]

# Fast PR spine jobs stay always-on: lockstep drift, skill/MCP drift,
# core JVM, CLJS node integration, and JS harness self-tests. Expensive
# browser, bundle, examples, Story/Causa, tool, template, MCP-live, and
# skill structural jobs are guarded by the conservative changed-surface
# classifier below. Skipped diagnostic jobs are not required coverage; the
# nightly/manual workflow carries the rigorous full sweep.

jobs:
  detect_changed_surfaces:
    name: Detect changed test surfaces
    runs-on: ubuntu-latest
    outputs:
      implementation_jvm: ${{ steps.detect.outputs.implementation_jvm }}
      adapter_diagnostic: ${{ steps.detect.outputs.adapter_diagnostic }}
      cljs_browser: ${{ steps.detect.outputs.cljs_browser }}
      cljs_prod: ${{ steps.detect.outputs.cljs_prod }}
      bundle_isolation: ${{ steps.detect.outputs.bundle_isolation }}
      reagent_slim_bundle: ${{ steps.detect.outputs.reagent_slim_bundle }}
      adapter_testbed_smokes: ${{ steps.detect.outputs.adapter_testbed_smokes }}
      tools_jvm: ${{ steps.detect.outputs.tools_jvm }}
      template_expensive: ${{ steps.detect.outputs.template_expensive }}
      mcp_conformance: ${{ steps.detect.outputs.mcp_conformance }}
      mcp_live: ${{ steps.detect.outputs.mcp_live }}
      story_causa_browser: ${{ steps.detect.outputs.story_causa_browser }}
      skills_structural: ${{ steps.detect.outputs.skills_structural }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Classify changed surfaces
        id: detect
        run: ./.github/scripts/report-changed-surfaces.sh

  # PR-time drift detection for the lockstep-version contract
  # (rf2-ace2 / rf2-w05l). Fast — the script is shared with
  # release.yml's pre-deploy gate so the contract has a single source
  # of truth.
  verify-version-lockstep:
    name: Verify lockstep version contract (rf2-ace2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Verify lockstep version contract
        run: ./.github/scripts/verify-version-lockstep.sh

  # PR-time drift detection for the skill ↔ MCP tool-catalogue contract
  # (rf2-flzdp). Source: rf2-fvy7o audit, finding #6. When an MCP server
  # adds a tool (e.g. re-frame2-pair-mcp added `subscribe`/`unsubscribe` under
  # rf2-hq49) the consumer skill's `allowed-tools` front-matter doesn't
  # auto-update; the agent host blocks the new tool even though the
  # server advertises it. The script in scripts/check_skill_mcp_drift.py
  # diffs every MCP-server tool catalogue against its consumer skill's
  # allow-list and fails on drift in either direction.
  #
  # Fast — pure Python stdlib, no setup beyond actions/setup-python.
  # The script ships with a `_BASELINE` set that documents the drift on
  # main at PR-landing time so this gate lands before its companion
  # fix (rf2-aks1t) completes; trim entries from `_BASELINE` as their
  # underlying drift is resolved.
  verify-skill-mcp-drift:
    name: Verify skill ↔ MCP allowed-tools drift (rf2-flzdp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Diff MCP tool catalogues vs skill allowed-tools
        run: python scripts/check_skill_mcp_drift.py --verbose --ci

  jvm-core:
    name: JVM core (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/core
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-core-${{ hashFiles('implementation/core/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-core-
            ${{ runner.os }}-clj-

      - name: Run JVM tests (core artefact)
        run: clojure -M:test

  jvm-reagent:
    name: Diagnostic skip-ok JVM reagent-adapter classpath probe
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.adapter_diagnostic == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/adapters/reagent
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-reagent-${{ hashFiles('implementation/adapters/reagent/deps.edn', 'implementation/core/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-reagent-
            ${{ runner.os }}-clj-

      # The Reagent artefact's :test alias has no JVM-runnable tests of
      # its own (the adapter ns is :cljs-only). The job exists so the
      # artefact's deps + classpath wiring stay green and any future JVM
      # adapter probe lands here. Skip-on-empty is acceptable; the
      # cognitect test-runner returns 0 when there are no test
      # namespaces matching its pattern.
      - name: Run JVM tests (reagent artefact, classpath probe)
        run: clojure -M:test || echo "no JVM-runnable tests in reagent artefact (expected)"

  jvm-reagent-slim:
    name: Diagnostic skip-ok JVM reagent-slim-adapter classpath probe
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.adapter_diagnostic == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/adapters/reagent-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-reagent-slim-${{ hashFiles('implementation/adapters/reagent-slim/deps.edn', 'implementation/core/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-reagent-slim-
            ${{ runner.os }}-clj-

      # The reagent-slim artefact (rf2-5djt Stage 4, rf2-6hyy) is the
      # React-19 Reagent rewrite. Its :test alias carries CLJS unit
      # tests only — the adapter ns is :cljs-only. The job exists so
      # the artefact's deps + classpath wiring stay green. Skip-on-empty
      # is acceptable; the cognitect test-runner returns 0 when there
      # are no test namespaces matching its pattern. The CLJS unit
      # tests run via shadow-cljs's :node-test build (see cljs job).
      - name: Run JVM tests (reagent-slim artefact, classpath probe)
        run: clojure -M:test || echo "no JVM-runnable tests in reagent-slim artefact (expected)"

  jvm-uix:
    name: Diagnostic skip-ok JVM uix-adapter classpath probe
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.adapter_diagnostic == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/adapters/uix
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-uix-${{ hashFiles('implementation/adapters/uix/deps.edn', 'implementation/core/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-uix-
            ${{ runner.os }}-clj-

      # The UIx artefact's :test alias has no JVM-runnable tests of its
      # own (the adapter ns is :cljs-only — UIx is a CLJS-only library).
      # The job exists so the artefact's deps + classpath wiring stay
      # green. Skip-on-empty is acceptable; the cognitect test-runner
      # returns 0 when there are no test namespaces matching its
      # pattern. Per rf2-3yij Decision 7 the substrate's smoke-test
      # surface is the browser-side counter + login specs — see the
      # adapter-testbed-smokes job below.
      - name: Run JVM tests (uix artefact, classpath probe)
        run: clojure -M:test || echo "no JVM-runnable tests in uix artefact (expected)"

  jvm-helix:
    name: Diagnostic skip-ok JVM helix-adapter classpath probe
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.adapter_diagnostic == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/adapters/helix
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-helix-${{ hashFiles('implementation/adapters/helix/deps.edn', 'implementation/core/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-helix-
            ${{ runner.os }}-clj-

      # The Helix artefact's :test alias has no JVM-runnable tests of
      # its own (the adapter ns is :cljs-only — Helix is a CLJS-only
      # library). The job exists so the artefact's deps + classpath
      # wiring stay green. Skip-on-empty is acceptable; the cognitect
      # test-runner returns 0 when there are no test namespaces
      # matching its pattern. Per rf2-2qit Decision 7 the substrate's
      # smoke-test surface is the browser-side counter + login specs —
      # see the adapter-testbed-smokes job below.
      - name: Run JVM tests (helix artefact, classpath probe)
        run: clojure -M:test || echo "no JVM-runnable tests in helix artefact (expected)"

  jvm-schemas:
    name: JVM schemas (clojure -M:test)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.implementation_jvm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/schemas
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-schemas-${{ hashFiles('implementation/schemas/deps.edn', 'implementation/core/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-schemas-
            ${{ runner.os }}-clj-

      # The schemas artefact ships JVM-runnable test namespaces under
      # implementation/schemas/test/ — the sensitive-path walker,
      # validator-table hot-swap, and boundary-warn-once tests
      # (schemas_test, schemas_sensitive_test, late_bind_missing_test)
      # PLUS the schema-*.edn + error-schema-failure.edn conformance
      # corpus runner (schemas_conformance_test) added per rf2-2l08g.
      # The cognitect test-runner returns non-zero on any failure; the
      # job MUST surface that so the gate is real.
      - name: Run JVM tests (schemas artefact)
        run: clojure -M:test

  jvm-machines:
    name: JVM machines (clojure -M:test)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.implementation_jvm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/machines
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-machines-${{ hashFiles('implementation/machines/deps.edn', 'implementation/core/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-machines-
            ${{ runner.os }}-clj-

      # The machines artefact ships JVM-runnable test namespaces under
      # implementation/machines/test/ — pure machine-transition tests
      # (machine_transition_purity_test, after_test, spawn_all_test,
      # spawn_registry_test, parallel_test, tags_test, initial_entry_test,
      # …) plus the Mode B conformance corpus runner
      # (machines_conformance_test) added per rf2-d0wem. The cognitect
      # test-runner returns non-zero on any failure; the job MUST surface
      # that so the gate is real. Earlier this step suffixed `|| echo …`
      # to allow an empty test suite — now that JVM tests exist the
      # fallback would mask failures, so it's removed.
      - name: Run JVM tests (machines artefact)
        run: clojure -M:test

  jvm-routing:
    name: JVM routing (clojure -M:test)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.implementation_jvm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/routing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-routing-${{ hashFiles('implementation/routing/deps.edn', 'implementation/core/deps.edn', 'implementation/schemas/deps.edn', 'implementation/flows/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-routing-
            ${{ runner.os }}-clj-

      - name: Run JVM tests (routing artefact)
        run: clojure -M:test

  jvm-flows:
    name: JVM flows (clojure -M:test)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.implementation_jvm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/flows
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-flows-${{ hashFiles('implementation/flows/deps.edn', 'implementation/core/deps.edn', 'implementation/schemas/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-flows-
            ${{ runner.os }}-clj-

      - name: Run JVM tests (flows artefact)
        run: clojure -M:test

  jvm-http:
    name: JVM http (clojure -M:test)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.implementation_jvm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/http
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-http-${{ hashFiles('implementation/http/deps.edn', 'implementation/core/deps.edn', 'implementation/schemas/deps.edn', 'implementation/flows/deps.edn', 'implementation/routing/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-http-
            ${{ runner.os }}-clj-

      - name: Run JVM tests (http artefact)
        run: clojure -M:test

  jvm-ssr:
    name: JVM ssr (clojure -M:test)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.implementation_jvm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/ssr
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-ssr-${{ hashFiles('implementation/ssr/deps.edn', 'implementation/core/deps.edn', 'implementation/schemas/deps.edn', 'implementation/flows/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-ssr-
            ${{ runner.os }}-clj-

      # The ssr artefact ships JVM-runnable test namespaces under
      # implementation/ssr/test/ — render-to-string + hydrate + the
      # full request lifecycle (ssr_end_to_end_test, ssr_head_test,
      # ssr_request_cofx_test, ssr_compatibility_checks_test,
      # ssr_source_coord_test, ssr_teardown_load_test, ssr_hash_test,
      # source_coord_parity_test, late_bind_missing_test) PLUS the
      # ssr-*.edn conformance corpus runner (ssr_conformance_test)
      # added per rf2-i3qc0. The cognitect test-runner returns
      # non-zero on any failure; this gate surfaces an ssr regression
      # at the ssr artefact's CI step rather than only downstream at
      # core's full-corpus runner.
      - name: Run JVM tests (ssr artefact)
        run: clojure -M:test

  jvm-ssr-ring:
    name: JVM ssr-ring (clojure -M:test)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.implementation_jvm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/ssr-ring
    steps:
