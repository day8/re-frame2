  # ---------------------------------------------------------------------------
  # MCP-client conformance jobs (rf2-cum40).
  #
  # The `node-test-tools-{re-frame2-pair,story}-mcp` jobs above drive each server
  # via hand-rolled JSON-RPC on stdin/stdout. That catches server-side
  # bugs but cannot see protocol-mismatch bugs visible only when a real
  # MCP-aware consumer (Claude Code, Continue, …) attaches via the
  # official `@modelcontextprotocol/sdk` `Client` — that library
  # validates every response against the spec's Zod schemas
  # (InitializeResultSchema, ListToolsResultSchema, CallToolResultSchema,
  # …), so a server response that's "close enough" to fool a hand-rolled
  # probe can still fail the SDK's parse step.
  #
  # The `tools/mcp-conformance/` artefact closes that gap. One script
  # per server, each driving the server through the SDK's
  # StdioClientTransport + Client.connect() + listTools()/callTool()
  # surface, walking one canonical workflow per server. See
  # tools/mcp-conformance/README.md for the full rationale and per-test
  # scope.
  # ---------------------------------------------------------------------------

  mcp-conformance-re-frame2-pair:
    name: MCP conformance tools/re-frame2-pair-mcp (rf2-cum40)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.mcp_live == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/mcp-conformance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      # Single Maven/gitlibs cache that covers BOTH shadow-cljs boots in
      # this job — the re-frame2-pair-mcp server bundle compile AND the hermetic
      # fixture watch (rf2-c565x). The fixture at
      # `skills/re-frame2-pair/tests/fixture/` resolves core + reagent +
      # epoch as `:local/root` entries, so a cold-cache run pulls every
      # transitive dep of those three artefacts (Reagent, Malli, …)
      # before shadow-cljs can even write the nREPL port file.
      #
      # On a cold-cache GHA runner that resolve takes >240s and the
      # hermetic orchestrator's `SHADOW_BOOT_TIMEOUT_MS` watchdog fires
      # before the port file lands — "boot failed: nREPL port not
      # found". Hashing the fixture's deps.edn / shadow-cljs.edn and the
      # three local-root deps.edn files into the cache key keeps the
      # cache warm across runs that don't touch those files; the wider
      # `restore-keys` ladder still lets a partial hit land when only
      # one file changes.
      - name: Cache Maven / gitlibs (shadow-cljs deps for re-frame2-pair-mcp build + hermetic fixture)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-mcp-conformance-re-frame2-pair-${{ hashFiles('tools/re-frame2-pair-mcp/shadow-cljs.edn', 'tools/re-frame2-pair-mcp/package.json', 'skills/re-frame2-pair/tests/fixture/deps.edn', 'skills/re-frame2-pair/tests/fixture/shadow-cljs.edn', 'implementation/core/deps.edn', 'implementation/adapters/reagent/deps.edn', 'implementation/epoch/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-mcp-conformance-re-frame2-pair-
            ${{ runner.os }}-cljs-tools-re-frame2-pair-mcp-
            ${{ runner.os }}-cljs-

      # The conformance harness drives the re-frame2-pair-mcp Node bundle, so we
      # need to compile that bundle first. Same shadow-cljs entry point
      # as the node-test-tools-re-frame2-pair-mcp job above. We don't run
      # re-frame2-pair-mcp's own tests here — that's the parallel job's
      # responsibility.
      - name: Install re-frame2-pair-mcp deps
        working-directory: tools/re-frame2-pair-mcp
        run: npm install

      - name: Compile re-frame2-pair-mcp server bundle (shadow-cljs :server)
        working-directory: tools/re-frame2-pair-mcp
        run: npx shadow-cljs compile server

      - name: Install mcp-conformance deps
        run: npm install

      # exec-safety helpers (rf2-33vvc): unit-test the
      # trusted-PATH-resolution + symlink-safe-unlink helpers that the
      # hermetic orchestrator + story-mcp harness route through. The
      # symlink-rejection branches need a runner that allows symlinkSync
      # — Ubuntu GHA does; Windows would soft-skip them.
      - name: Run mcp-conformance exec-safety unit tests
        run: npm run test:exec-safety

      - name: Run re-frame2-pair-mcp end-to-end MCP-client conformance
        run: npm run test:re-frame2-pair

      # Live-runtime variant (rf2-ynaoc): exercises the wire-cap
      # `:rf.mcp/overflow` marker under a real over-budget eval. Gated
      # on $SHADOW_CLJS_NREPL_PORT — unset on this step, so it exits 0
      # with a SKIP marker. The script's contract is that an unset gate
      # is a clean SKIP, not a failure; this step still runs so the
      # gating logic is exercised on every CI run and a regression that
      # broke the SKIP path (e.g. crashing on missing env) surfaces
      # here. The hermetic variant below runs the actual live path.
      - name: Run re-frame2-pair-mcp live-overflow conformance (SKIPPED without nREPL)
        run: npm run test:re-frame2-pair-live-overflow

      # Hermetic live-runtime variant (rf2-uw6d6): boots shadow-cljs
      # against the re-frame2-pair fixture (`skills/re-frame2-pair/tests/fixture/`
      # — a minimal counter with `re-frame2-pair.runtime` preloaded),
      # launches headless Chromium so the runtime sentinel lands, then
      # runs the same `live-re-frame2-pair-overflow.js` with
      # SHADOW_CLJS_NREPL_PORT set to the spawned port. Tears
      # shadow-cljs + Chromium down on exit. Closes the CI-coverage gap
      # the SKIP-path leaves: cap-trigger threshold drift, marker shape
      # regressions on real payloads, and SDK strict-schema rejection
      # of cap-marker shapes now surface on every CI run, not only
      # locally on Mike's machine.
      - name: Install implementation deps (for playwright)
        working-directory: implementation
        run: npm install --no-audit --no-fund

      - name: Install Playwright chromium (for hermetic browser preload)
        working-directory: implementation
        run: npx playwright install --with-deps chromium

      - name: Run re-frame2-pair-mcp live-overflow conformance (HERMETIC — spawns shadow-cljs)
        run: npm run test:re-frame2-pair-live-overflow-hermetic

  mcp-conformance-story:
    name: MCP conformance tools/story-mcp (rf2-cum40)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.mcp_conformance == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/mcp-conformance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Cache Maven / gitlibs (story-mcp Clojure deps)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-mcp-conformance-story-${{ hashFiles('tools/story-mcp/deps.edn', 'tools/story/deps.edn', 'implementation/core/deps.edn', 'implementation/adapters/reagent/deps.edn', 'implementation/machines/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-mcp-conformance-story-
            ${{ runner.os }}-node-tools-story-mcp-
            ${{ runner.os }}-clj-tools-story-mcp-
            ${{ runner.os }}-clj-

      - name: Install mcp-conformance deps
        run: npm install

      - name: Run story-mcp end-to-end MCP-client conformance
        run: npm run test:story

  # ---------------------------------------------------------------------------
  # MCP conformance — JVM wire-vocab gates (rf2-rto1l).
  #
  # The three JVM test files under `tools/mcp-conformance/wire-vocab/test/`
  # — `wire_vocab_test.clj` (wire-marker vocabulary, rf2-j2z7o),
  # `indicator_field_test.clj` (envelope-slot parity, rf2-6m8tq), and
  # `slot_name_test.clj` (tool-arg slot-name parity, rf2-zvv65) — pin
  # the cross-server vocabulary contracts that the artefact exists to
  # enforce. Pre-rf2-rto1l these tests had ZERO CI coverage: the
  # sibling `mcp-conformance-{re-frame2-pair,story}` jobs run only the
  # Node-side `npm run test:...` scripts; no job ran `clojure -M:test`
  # from `wire-vocab/`. The contract gates fired only when Mike happened
  # to invoke them locally — every PR shipped without them.
  #
  # Per `wire-vocab/README.md`, total cold-JVM run time is ~3-5s; this
  # job adds near-zero critical-path latency. The Maven cache key
  # hashes `wire-vocab/deps.edn` so a deps bump invalidates correctly;
  # the wider `restore-keys` ladder keeps partial hits warm.
  # ---------------------------------------------------------------------------

  mcp-conformance-wire-vocab:
    name: MCP conformance wire-vocab (rf2-j2z7o + rf2-6m8tq + rf2-zvv65)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.mcp_conformance == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/mcp-conformance/wire-vocab
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-mcp-conformance-wire-vocab-${{ hashFiles('tools/mcp-conformance/wire-vocab/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-mcp-conformance-wire-vocab-
            ${{ runner.os }}-clj-

      - name: Run JVM wire-vocab conformance gates
        run: clojure -M:test

  skills-structural:
    name: Skills structural tests (changed skill paths only)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.skills_structural == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Babashka
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          bb: latest

      - name: Run re-frame2-pair structural tests
        working-directory: skills/re-frame2-pair
        run: |
          set -euo pipefail
          bb tests/prompts/prompt_regression_test.clj
          for test_file in tests/runtime/*_test.clj tests/shim/shim_test.clj; do
            bb "$test_file"
          done

      - name: Run shared retro-protocol structural test
        run: bb skills/shared/tests/retro_protocol_test.clj
