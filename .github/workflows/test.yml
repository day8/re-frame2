name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  jvm:
    name: JVM (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-${{ hashFiles('implementation/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-

      - name: Run JVM tests
        run: clojure -M:test

  cljs:
    name: CLJS (shadow-cljs :node-test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Cache Maven / gitlibs (shadow-cljs deps)
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      - name: Compile and run node-test build
        run: |
          npx shadow-cljs compile node-test
          node out/node-test.js
