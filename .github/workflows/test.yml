          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      # rf2-80y2h: mcp-base now carries a CLJS test target (shadow-cljs
      # :node-test build) covering the `.cljc` `:cljs` reader-conditional
      # branches the JVM suite cannot reach. Node is required to run it.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-tools-mcp-base-${{ hashFiles('tools/mcp-base/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-tools-mcp-base-
            ${{ runner.os }}-clj-

      # tools/mcp-base ships as a `.cljc` library (rf2-vw4sq) shared
      # across the MCP servers (re-frame2-pair-mcp, story-mcp). The
      # algorithmic content (sensitive-filter, diff-encode, args
      # parsers, overflow shape, vocab constants) is platform-agnostic
      # — a JVM round-trip is the cheapest PR-time gate. Pair2-mcp's
      # CLJS-side coverage (under `node-test-tools-re-frame2-pair-mcp` below)
      # exercises the same primitives via the shadow-cljs compile
      # path; story-mcp's `jvm-tools-story-mcp` job covers the JVM
      # consumer.
      - name: Run JVM tests (tools/mcp-base artefact)
        run: clojure -M:test

      # rf2-80y2h: the CLJS test target exercises the three `.cljc`
      # `:cljs`-only branches the JVM suite (Malli always present) can
      # never reach — the `goog-define` `validate-patches?` default, the
      # `:cljs` arm of `resolve-malli-validate`, and the
      # soft-pass-when-Malli-absent no-op in the validation gates. The
      # :cljs-test alias deliberately omits Malli so the soft-pass branch
      # actually runs. Both MCP servers consume mcp-base in CLJS; nothing
      # pinned these paths before.
      - name: Install Node deps (shadow-cljs for the CLJS test build)
        run: npm install

      - name: Run CLJS tests (tools/mcp-base artefact)
        run: npm run test:cljs

  jvm-tools-template:
    name: JVM tools/template (clojure -M:test)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.template_expensive == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/template
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      # rf2-ir6a0 — Node.js is required for the
      # `emitted_test_run_test.clj` slice (compiles + runs the emitted
      # `events_test.cljs` against the in-repo source tree via
      # `clojure -M:shadow compile test` + `node out/node-test.js`).
      # Gated below behind RF2_TEMPLATE_RUN_EMITTED_TESTS=1 so local
      # fast-loop runs (where Node may be absent) stay green.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-tools-template-${{ hashFiles('tools/template/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-tools-template-
            ${{ runner.os }}-clj-

      # rf2-ir6a0 — `npm ci` populates implementation/node_modules so
      # the emitted-app's compiled :node-test bundle can resolve React
      # at runtime. The emitted-test-run slice symlinks (or NODE_PATHs
      # to) this tree rather than `npm install`-ing per substrate.
      - name: npm install (for emitted-test-run smoke)
        working-directory: implementation
        run: npm ci

      # tools/template is a deps-new template (rf2-dolpf §2; clj-new
      # body dropped in §2.5 / rf2-40vmd) — its tests
      # (`template_test.clj`, `template_emission_test.clj`,
      # `emitted_test_run_test.clj`, `version_lockstep_test.clj`)
      # generate scaffolded apps into a tmp dir and assert the shape,
      # static parse, AND behavioural compile+run. This is the only
      # PR-time CI surface for this artefact.
      #
      # `emitted_test_run_test.clj` compiles + runs the emitted
      # `events_test.cljs` per substrate (and the `:include-story? true`
      # with-story scaffold's `:app` build) against the in-repo source
      # tree, with deps rewritten to :local/root (closes rf2-owbpr /
      # rf2-ir6a0; with-story tier rf2-5v619). Gated behind
      # RF2_TEMPLATE_RUN_EMITTED_TESTS=1 — opt-in because the local
      # fast loop may lack Node and the smoke costs ~30–60 s per
      # substrate cold-cache. The `npm ci` step above primes
      # implementation/node_modules so the emitted bundle's React
      # imports resolve at run time.
      #
      # NB: there is deliberately no `clojure -P` deps-resolve probe.
      # The generated deps.edn pins the alpha-channel :mvn/version coords
      # (0.0.1.alpha) which are not published anywhere — re-frame2
      # distributes via git-coord, not Clojars (rf2-dolpf §2.5/§3) — so a
      # `-P` against the published coords cannot resolve and would always
      # red. The behavioural tier transitively resolves + compiles the
      # full deps tree under the :local/root rewrite, which is the
      # strongest resolve signal achievable pre-publish. A published-coord
      # resolve probe is a forward concern for the §3 release pipeline.
      - name: Run JVM tests (tools/template artefact)
        env:
          RF2_TEMPLATE_RUN_EMITTED_TESTS: "1"
        run: clojure -M:test

