name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  jvm:
    name: JVM (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-${{ hashFiles('implementation/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-

      - name: Run JVM tests
        run: clojure -M:test

  cljs:
    name: CLJS (shadow-cljs :node-test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Cache Maven / gitlibs (shadow-cljs deps)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      - name: Compile and run node-test build
        run: |
          npx shadow-cljs compile node-test
          node out/node-test.js
