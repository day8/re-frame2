  jvm-machines:
    name: JVM machines (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/machines
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-machines-${{ hashFiles('implementation/machines/deps.edn', 'implementation/core/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-machines-
            ${{ runner.os }}-clj-

      # The machines artefact's :test alias has no JVM-runnable tests of
      # its own (the machine_cljs_test is CLJS-only). The job exists so
      # the artefact's deps + classpath wiring stay green and any future
      # JVM-runnable machine tests land here. Skip-on-empty is acceptable;
      # the cognitect test-runner returns 0 when there are no test
      # namespaces matching its pattern.
      - name: Run JVM tests (machines artefact, classpath probe)
        run: clojure -M:test || echo "no JVM-runnable tests in machines artefact (expected)"

  jvm-routing:
    name: JVM routing (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/routing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-routing-${{ hashFiles('implementation/routing/deps.edn', 'implementation/core/deps.edn', 'implementation/schemas/deps.edn', 'implementation/flows/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-routing-
            ${{ runner.os }}-clj-

      - name: Run JVM tests (routing artefact)
        run: clojure -M:test

  jvm-flows:
    name: JVM flows (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/flows
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-flows-${{ hashFiles('implementation/flows/deps.edn', 'implementation/core/deps.edn', 'implementation/schemas/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-flows-
            ${{ runner.os }}-clj-

      - name: Run JVM tests (flows artefact)
        run: clojure -M:test

  jvm-http:
    name: JVM http (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/http
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-http-${{ hashFiles('implementation/http/deps.edn', 'implementation/core/deps.edn', 'implementation/schemas/deps.edn', 'implementation/flows/deps.edn', 'implementation/routing/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-http-
            ${{ runner.os }}-clj-

      - name: Run JVM tests (http artefact)
        run: clojure -M:test

  jvm-ssr:
    name: JVM ssr (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/ssr
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-ssr-${{ hashFiles('implementation/ssr/deps.edn', 'implementation/core/deps.edn', 'implementation/schemas/deps.edn', 'implementation/flows/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-ssr-
            ${{ runner.os }}-clj-

      - name: Run JVM tests (ssr artefact)
        run: clojure -M:test

  jvm-epoch:
    name: JVM epoch (clojure -M:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/epoch
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
          cli: latest

      - name: Cache Maven / gitlibs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-epoch-${{ hashFiles('implementation/epoch/deps.edn', 'implementation/core/deps.edn', 'implementation/schemas/deps.edn', 'implementation/flows/deps.edn', 'implementation/routing/deps.edn', 'implementation/machines/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clj-epoch-
            ${{ runner.os }}-clj-

      - name: Run JVM tests (epoch artefact)
        run: clojure -M:test

  cljs:
    name: CLJS (shadow-cljs :node-test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Cache Maven / gitlibs (shadow-cljs deps)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      - name: Compile and run node-test build (core + reagent)
        run: |
          npx shadow-cljs compile node-test
          node out/node-test.js

  cljs-browser:
    name: CLJS (shadow-cljs :browser-test, headless Chromium)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08  # 13.4
        with:
