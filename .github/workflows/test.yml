      #     surfaces (counter + deliberate-throw), compiling 2 testbed
      #     bundles instead of 13.
      #   - Story :play-script CI-as-test gate (rf2-3qcxk): drives the
      #     live Story shell over the single counter-with-stories
      #     testbed and runs every variant's :play-script. This is the
      #     gate that renders the assertion-strip, so the rf2-5lw9w
      #     assertion-strip :key fix stays covered on the PR critical
      #     path.
      #
      # The full sweep (test:causa-feature-gate, test:story-feature-load,
      # test:story-static) runs nightly in expensive-tests.yml.
      - name: Run Causa feature browser gate (PR-smoke)
        run: npm run test:causa-feature-gate:smoke

      # rf2-3qcxk — every Story variant whose body carries a
      # `:play-script` slot doubles as an automated regression test.
      # The runner discovers them via `re-frame.story.play.ci-runner`,
      # drives each through the live shell, and reports a structured
      # pass/fail row per variant. Kept on the PR critical path: it is a
      # single-testbed compile and is the live render path that exercises
      # the assertion-strip (rf2-5lw9w).
      - name: Run Story :play-script CI-as-test gate
        run: npm run test:story-play-scripts

  cljs-reagent-slim-bundle-isolation:
    name: CLJS Reagent Slim bundle isolation (adapter-owned, rf2-2ppcv)
    needs: detect_changed_surfaces
    if: needs.detect_changed_surfaces.outputs.reagent_slim_bundle == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Cache Maven / gitlibs (shadow-cljs deps)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-cljs-reagent-slim-bundle-isolation-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cljs-reagent-slim-bundle-isolation-
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      # The S3-008 adapter-owned bundle-isolation contract for day8/reagent-slim
      # (rf2-5lbx). Builds both `examples/counter` (stock-Reagent) and
      # `examples/counter-slim-and-fast` (slim Reagent rewrite) under
      # :advanced, then greps the slim bundle for stock-Reagent
      # impl-namespace fingerprints AND for `react-dom/server` symbols.
      # Both must be absent from the slim bundle. The same sentinels
      # are required to be present in the stock bundle as a methodology
      # sanity check — if a future stock-Reagent upgrade DCEs them out
      # of the stock build too, the script catches the lost signal and
      # the sentinel set is re-derived.
      #
      # Dual contract: stock-Reagent impl + react-dom/server isolation.
      # The slim build's run-fn deliberately exercises
      # reagent2.dom.server/render-to-static-markup so the
      # react-dom/server-absence assertion is non-vacuous (the SSR path
      # IS in the slim bundle, just pure-CLJS — per IMPL-SPEC §8 +
      # S3-005).
      - name: Verify Reagent Slim bundle isolates stock Reagent + react-dom/server
        run: npm run test:reagent-slim:bundle-isolation

