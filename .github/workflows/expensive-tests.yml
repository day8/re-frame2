name: expensive tests

on:
  schedule:
    - cron: "17 15 * * *"
  workflow_dispatch:

jobs:
  browser-bundle-and-story-gates:
    name: Browser, bundle, examples, Story/Causa gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-expensive-implementation-${{ hashFiles('implementation/shadow-cljs.edn', 'implementation/package-lock.json', 'implementation/**/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-expensive-implementation-
            ${{ runner.os }}-cljs-

      - name: npm install
        run: npm ci

      - name: Install Playwright (Chromium + system deps)
        run: npx playwright install --with-deps chromium

      - name: Run rigorous implementation browser and bundle gates
        run: |
          set -euo pipefail
          npm run test:browser
          npm run test:browser-schemas-boundary-prod
          npm run test:browser-prod-elision
          npm run test:elision
          npm run test:bundle-isolation
          npm run test:reagent-slim:bundle-isolation
          npm run test:examples
          npm run test:story-feature-load
          npm run test:causa-feature-gate
          npm run test:story-static

  template-emitted-app:
    name: Template emitted-app smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/template
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-expensive-template-${{ hashFiles('tools/template/deps.edn', 'implementation/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-expensive-template-
            ${{ runner.os }}-clj-

      - name: npm install (for emitted-test-run smoke)
        working-directory: implementation
        run: npm ci

      - name: Run template emitted-app smoke
        env:
          RF2_TEMPLATE_DEPS_RESOLVE: "1"
          RF2_TEMPLATE_RUN_EMITTED_TESTS: "1"
        run: clojure -M:test

  mcp-live:
    name: MCP live and client conformance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/mcp-conformance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2  # 13.6.0
        with:
          cli: latest

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Cache Maven / gitlibs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-expensive-mcp-live-${{ hashFiles('tools/re-frame2-pair-mcp/shadow-cljs.edn', 'tools/re-frame2-pair-mcp/package.json', 'tools/mcp-conformance/package.json', 'tools/story-mcp/deps.edn', 'skills/re-frame2-pair/tests/fixture/deps.edn', 'skills/re-frame2-pair/tests/fixture/shadow-cljs.edn') }}
          restore-keys: |
            ${{ runner.os }}-expensive-mcp-live-
            ${{ runner.os }}-cljs-tools-re-frame2-pair-mcp-
            ${{ runner.os }}-clj-

      - name: Install re-frame2-pair-mcp deps
        working-directory: tools/re-frame2-pair-mcp
        run: npm install

      - name: Compile re-frame2-pair-mcp server bundle
        working-directory: tools/re-frame2-pair-mcp
        run: npx shadow-cljs compile server

      - name: Install mcp-conformance deps
        run: npm install

      - name: Run MCP client conformance
        run: |
          set -euo pipefail
          npm run test:exec-safety
          npm run test:re-frame2-pair
          npm run test:story
          npm run test:causa

      - name: Install implementation deps (for Playwright)
        working-directory: implementation
        run: npm install --no-audit --no-fund

      - name: Install Playwright chromium (for hermetic browser preload)
        working-directory: implementation
        run: npx playwright install --with-deps chromium

      - name: Run re-frame2-pair live-overflow conformance
        run: npm run test:re-frame2-pair-live-overflow-hermetic
